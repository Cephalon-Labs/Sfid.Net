name: Publish GitHub Packages

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = & ./eng/Get-AssemblyVersion.ps1
          $tag = '${{ github.event.release.tag_name }}'

          if ($tag -ne $version -and $tag -ne "v$version") {
              throw "Release tag '$tag' must match the assembly version '$version' or 'v$version'."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore, test, and pack
        shell: pwsh
        run: ./eng/Pack.ps1 -Configuration Release

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: artifacts/nuget

      - name: Publish packages to GitHub Packages
        shell: pwsh
        run: |
          $source = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          $packages = @(
              Get-ChildItem -LiteralPath artifacts/nuget -Filter *.nupkg |
                  Where-Object { $_.Name -notlike "*.symbols.nupkg" }
          )

          if ($packages.Count -eq 0) {
              throw "No packages were generated for publishing."
          }

          foreach ($package in $packages) {
              dotnet nuget push $package.FullName `
                  --api-key "${{ secrets.GITHUB_TOKEN }}" `
                  --source $source `
                  --skip-duplicate
          }
